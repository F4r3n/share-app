name: "test-build"
on: [pull_request, push]

jobs:
  test-tauri:
    strategy:
      fail-fast: false
      matrix:
        object: [{"os":"macos-latest"}, {"os":"ubuntu-22.04"}, {"os":"windows-latest"}, {"os":"ubuntu-22.04", "android":true}]


    runs-on: ${{ matrix.object.os }}
    environment: updater
    steps:
    - uses: actions/checkout@v4
    - name: setup node
      uses: actions/setup-node@v4
      with:
        node-version: lts/*

    - name: install Rust stable
      uses: dtolnay/rust-toolchain@stable
      with:
        # Those targets are only used on macos runners so it's in an `if` to slightly speed up windows and linux builds.
        targets: ${{ matrix.object.os == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}
    - name: install dependencies (ubuntu only)
      if: matrix.object.os == 'ubuntu-22.04'
      run: |
        sudo apt-get update
        sudo apt-get install -y libwebkit2gtk-4.0-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev

    - name: Setup java
      uses: actions/setup-java@v3
      if: ${{ matrix.object.android }}
      with:
        distribution: 'temurin'
        java-version: '11' 

    - name: Setup NDK 
      uses: nttld/setup-ndk@v1
      if: ${{ matrix.object.android }}
      id: setup-ndk
      with:
        ndk-version: r25b
        local-cache: true

    - name: Android Rust target
      if: ${{ matrix.object.android }}
      run: rustup target add aarch64-linux-android armv7-linux-androideabi i686-linux-android x86_64-linux-android

    - name: Install app dependencies
      run: yarn

    - name: Init Android Studio Project
      if: ${{ matrix.object.android }}
      run: yarn tauri android init
      env:
        NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}

    - name: Build apk
      if: ${{ matrix.object.android }}
      run: cargo install tauri-cli --version "^2.0.0-beta" && cargo tauri android build --split-per-abi --verbose
      env:
        NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
         
    - uses: tauri-apps/tauri-action@v0
      env:
        if: ${{ !matrix.object.android }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        TAURI_SIGNING_PRIVATE_KEY: ${{secrets.TAURI_PRIVATE_KEY}}
        TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{secrets.TAURI_KEY_PASSWORD}}
      with:
        includeUpdaterJson: true
